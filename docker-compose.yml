services:
  postgres:
    image: postgres:16-alpine
    container_name: idle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: idle
      POSTGRES_PASSWORD: idle
      POSTGRES_DB: idle_mmo
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idle -d idle_mmo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: idle_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
